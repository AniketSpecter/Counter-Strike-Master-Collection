name: Feature request
description: Suggest an improvement for the launcher or community experience.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you would expect the feature to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or additional context
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find the same request.
          required: true
